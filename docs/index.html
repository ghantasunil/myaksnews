<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AKS News</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <h1>My AKS News</h1>
        <p id="last-updated" class="header-meta"></p>
      </div>
      <div class="header-right">
        <input type="search" id="search" placeholder="Search articles..." aria-label="Search articles">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode"></button>
      </div>
    </div>
  </header>

  <nav class="filters">
    <div id="source-pills" class="pill-row"></div>
  </nav>

  <div class="toolbar">
    <span id="article-count" class="article-count"></span>
    <div class="toolbar-controls">
      <select id="time-filter" aria-label="Filter by time">
        <option value="all">All Time</option>
        <option value="today">Today</option>
        <option value="week" selected>This Week</option>
        <option value="month">Last 30 Days</option>
      </select>
      <select id="sort-filter" aria-label="Sort order">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>
  </div>

  <main id="feed-list"></main>

  <div id="empty-state" class="empty-state" hidden>
    <p>No articles match your filters.</p>
  </div>

  <div id="error-state" class="empty-state" hidden>
    <p>Failed to load feed data. Please try again later.</p>
  </div>

  <footer>
    <p>Updated daily via RSS.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
